---
name: Check Hugo Version

on:
  schedule:
    - cron: '12 0 * * *'  # Run daily just after midnight UTC
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write  # Required for closing PRs

jobs:
  check-hugo-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository for current version check
        uses: actions/checkout@v6

      - name: Check for new Hugo image version
        id: version-check
        run: |
          set -e  # Exit on any error
          CURRENT_VERSION=$(yq '.services.words_hugo.image' docker-compose.yml | sed -E 's/.*hugo:([0-9.]+).*/\1/')
          API_URL="https://registry.hub.docker.com/v2/repositories/floryn90/hugo/tags?page_size=100"
          ALL_TAGS=""

          # Loop through all pages
          while [ -n "$API_URL" ]; do
            echo "Fetching from: $API_URL"
            RESPONSE=$(curl -sf "$API_URL") || { echo "Failed to fetch from Docker Hub API"; exit 1; }

            # Check if response is valid JSON
            if ! echo "$RESPONSE" | jq empty > /dev/null 2>&1; then
              echo "Invalid JSON response"
              exit 1
            fi

            PAGE_TAGS=$(echo "$RESPONSE" | jq -r '.results[].name') || { echo "Failed to parse tags"; exit 1; }
            if [ -n "$PAGE_TAGS" ]; then
              ALL_TAGS="${ALL_TAGS}${PAGE_TAGS}"$'\n'
            fi

            # Get next page URL
            API_URL=$(echo "$RESPONSE" | jq -r '.next // empty')
            echo "Next page URL: ${API_URL:-none}"
          done

          # Debug output
          echo "All collected tags:"
          echo "$ALL_TAGS"

          # Process all collected tags
          LATEST_VERSION=$(echo "$ALL_TAGS" | grep -E "^[0-9]+\.[0-9]+\.[0-9]+-ext-alpine-onbuild$" | grep -v "latest" | sort -V | tail -n1 | sed 's/-ext-alpine-onbuild//' | tr -d '[:space:]')

          if [ -z "$LATEST_VERSION" ]; then
            echo "No valid version found"
            exit 1
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "Latest version: $LATEST_VERSION"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "new_version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
            echo "update_available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.version-check.outputs.update_available == 'true'
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Test build with new Hugo version
        id: hugo-build
        if: steps.version-check.outputs.update_available == 'true'
        run: |
          NEW_VERSION="${{ steps.version-check.outputs.new_version }}"
          docker pull "floryn90/hugo:${NEW_VERSION}-ext-alpine-onbuild"
          docker volume create words_hugo_output
          # Capture the build output to a variable
          BUILD_OUTPUT=$(docker run --rm \
            --env-file "${PWD}/hugo.env" \
            -v "${PWD}/site:/src" \
            -v words_hugo_output:/target \
            "floryn90/hugo:${NEW_VERSION}-ext-alpine-onbuild" --noBuildLock 2>&1)
          # Add build output to GITHUB_OUTPUT, escaping newlines
          {
            echo "run-output<<EOF"
            echo "$BUILD_OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update Version
        if: steps.version-check.outputs.update_available == 'true' && success()
        run: |
          OLD_VERSION="${{ steps.version-check.outputs.current_version }}"
          NEW_VERSION="${{ steps.version-check.outputs.new_version }}"

          # Escape regex metacharacters for safe sed replacement
          # shellcheck disable=SC2016
          ESCAPED_OLD_VERSION=$(printf '%s\n' "$OLD_VERSION" | sed -e 's/[.[\*^$()+?{}|]/\\&/g')

          # Update docker-compose.yml
          sed -i -E "s#(floryn90/hugo:)[0-9]+\.[0-9]+\.[0-9]+(-ext-alpine-onbuild)#\\1${NEW_VERSION}\\2#" docker-compose.yml

          # Update Makefile, devcontainer, hugo workflow
          sed -i -E "s/${ESCAPED_OLD_VERSION}/${NEW_VERSION}/g" \
            .github/workflows/hugo.yaml \
            .devcontainer/devcontainer.json \
            Makefile

      - name: Close existing Hugo update PRs
        if: steps.version-check.outputs.update_available == 'true' && success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find and close PRs with title starting with "chore: Update Hugo version"
          gh pr list \
            --search "is:open in:title chore: Update Hugo version" \
            --json number,title \
            --jq '.[]' | \
          while read -r pr; do
            number=$(echo "$pr" | jq -r .number)
            echo "Closing PR #$number: $(echo "$pr" | jq -r .title)"
            gh pr close "$number" --comment "Closing in favour of a new Hugo version update PR"
          done

      - name: Create Pull Request
        if: steps.version-check.outputs.update_available == 'true' && success()
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: Update Hugo version to ${{ steps.version-check.outputs.new_version\
            \ }}"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          signoff: false
          branch: update-hugo-${{ steps.version-check.outputs.new_version }}
          delete-branch: true
          add-paths: |
            docker-compose.yml
            Makefile
            .github/workflows/hugo.yaml
            .devcontainer/devcontainer.json
          title: "chore: Update Hugo version to ${{ steps.version-check.outputs.new_version\
            \ }}"
          body: |
            This PR updates the Hugo version to ${{ steps.version-check.outputs.new_version }}.

            Changes:
            - Updated Hugo version in various files

            ### Hugo Build Output
            ```
            ${{ steps.hugo-build.outputs.run-output }}
            ```

            This PR was automatically created by GitHub Actions.
          assignees: toozej

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
